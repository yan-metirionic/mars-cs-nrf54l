name: Release

on:
  push:
    tags: ["nrf54l/cs-samples@*"]

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    env:
      NCS_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install dependencies
        run: |
          rm -f /opt/ncs/toolchains/*/usr/lib/x86_64-linux-gnu/libnghttp2.so.14
          apt-get update && apt-get install -y --no-install-recommends curl zip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf

      - name: Init west workspace
        run: |
          west init -l . --mf west.yml
          west update -o=--depth=1 -n

      - name: Build all firmware
        run: |
          # Initiator presets
          bash ci/build.sh --target initiator --preset nrf54l15dk_cent_a1_1,ublox_cent_a1_1,ezurio_bl54l15u_cent_a2_4,fanstel_bm15c_cent_a1_1 --release-dir release

          # Reflector presets
          bash ci/build.sh --target reflector --preset nrf54l15dk_peri_a1_4,ezurio_bl54l15u_peri_a2_4,fanstel_bm15c_peri_a1_4,ublox_peri_a1_4 --release-dir release

      - name: Package firmware
        run: zip -j cs-ranging-firmware.zip release/*.hex

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs-ranging-firmware
          path: cs-ranging-firmware.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: cs-ranging-firmware

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${GITHUB_REF_NAME##*@}"

          CHANGELOG_SECTION=$(sed -n "/^## ${VERSION}(/,/^## /{/^## ${VERSION}(/p; /^## /!p; /^## /q}" CHANGELOG.md | head -n -1)

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION=$(sed -n "/^## Unreleased/,/^## /{/^## Unreleased/p; /^## /!p; /^## /q}" CHANGELOG.md | head -n -1)
          fi

          {
            echo "body<<EOFDELIMITER"
            echo "$CHANGELOG_SECTION"
            echo ""
            echo "---"
            echo ""
            echo "### Build Information"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "EOFDELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cs-ranging-firmware.zip
          body: ${{ steps.release-notes.outputs.body }}
